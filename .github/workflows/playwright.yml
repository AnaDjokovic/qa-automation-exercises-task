name: Playwright Tests

on:
  push:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # RUN API TESTS
      - name: Run Playwright API tests
        run: npm run test:api
        continue-on-error: true

      # RUN E2E TESTS ON CHROME
      - name: Run Playwright E2E Chrome
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npm run test:e2e:chrome -- --headed --retries=1
        continue-on-error: true

      # RUN E2E TESTS ON FIREFOX
      - name: Run Playwright E2E Firefox
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npm run test:e2e:firefox -- --headed --retries=1
        continue-on-error: true

      # REPORT
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
